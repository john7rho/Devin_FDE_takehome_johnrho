version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEVIN_API_KEY=${DEVIN_API_KEY}
      - DEVIN_API_URL=${DEVIN_API_URL:-https://api.devin.ai}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO_OWNER=${GITHUB_REPO_OWNER}
      - GITHUB_REPO_NAME=${GITHUB_REPO_NAME:-superset}
      - GITHUB_FORK_URL=${GITHUB_FORK_URL}
      - MAX_ACU_LIMIT=${MAX_ACU_LIMIT:-10}
      - MAX_CONCURRENT_SESSIONS=${MAX_CONCURRENT_SESSIONS:-3}
      - DATABASE_PATH=/app/data/state.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./superset-fork:/app/superset-fork:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_API_URL is baked at build time (inlined into the browser bundle).
      # Must be reachable from the user's browser, i.e. localhost — not "backend".
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:
  logs:
